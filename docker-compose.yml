version: '3.8'

services:
  api:
    build:
      context: ./services/api
    ports:
      - "8000:8000"
    environment:
      - DEMO_MODE=true
    volumes:
      - ./services/api:/app

  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./apps/web:/app
